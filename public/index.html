<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--dodati meta tag bitan za stranicu-->
    <meta name="description" content="This is an example page about HTML." />
    <!--dodati link za css dokumente -->
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <title>Filmovi</title> <!--promijeniti odgovarajući tekst na stranici
		ovo je samo predložak-->
</head>

<body>
    <header>
        <h1>Dobrodosli na moju web stranicu</h1>

        <input type="checkbox" id="menu-toggle" aria-hidden="true">

        <!-- Hamburger -->
        <label for="menu-toggle" class="menu-icon" aria-label="Otvori navigaciju">
            ☰
        </label>

        <nav aria-labelledby="primarna-navigacija" class="nav-menu"> <!-- dodati obilježja za ARIA-->
            <ul class="nav-list"> <!-- dodati da je navigacija lijevo poravnata i da je skrivena
									
					LV1: bez upotrebe javascripta -->
                <li><a href="#">Pocetna</a></li>
                <li><a href="/grafikoni">Grafikoni</a></li>
                <li><a href="/slike">Slike</a></li>
            </ul>
        </nav>
    </header>

    <main>


        <h1>Virtualna Videoteka</h1>


        <div class="filters">
            <label>Žanr:</label>
            <select id="genreFilter">
                <option value="">Svi</option>
            </select>

            <label>Godina od:</label>
            <input type="number" id="yearFilter" placeholder="npr. 1980">

            <label>Država:</label>
            <input type="text" id="countryFilter" placeholder="npr. USA">

            <label>Prosječna ocjena:</label>
            <input type="range" id="ratingFilter" min="0" max="10" step="0.1" value="0">
            <span id="ratingValue">0</span>

            <button id="filterBtn">Filtriraj</button>
        </div>


        <table id="movieTable">
            <thead>
                <tr>
                    <th>Naslov</th>
                    <th>Godina</th>
                    <th>Trajanje (min)</th>
                    <th>Žanr</th>
                    <th>Ocjena</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tableBody">

            </tbody>
        </table>

        <aside>
            <h3>Košarica</h3>
            <div id="cartItems"></div>
            <button id="confirmBtn">Potvrdi posudbu</button>
        </aside>

    </main>


    <!--dodati odgovarajuće elemente na temelju danog zadatka: tablice, slike, tekst
		Nepotrebno obrisati! -->
    <footer>
        <p>&copy; 2026. Web Programiranje. Sva prava pridrzana.</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
